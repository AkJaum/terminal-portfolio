services:
  project-runner:
    build:
      context: ./services/project-runner
    container_name: terminal-app-project-runner
    environment:
      - PORT=${RUNNER_PORT:-8080}
      - WORKDIR_BASE=${WORKDIR_BASE:-/tmp/runner-workspaces}
      - RUNNER_SHARED_TOKEN=${RUNNER_SHARED_TOKEN:?set RUNNER_SHARED_TOKEN}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,project-runner}
      - MAX_REQUESTS_PER_ID_PER_MINUTE=${MAX_REQUESTS_PER_ID_PER_MINUTE:-120}
      - RATE_WINDOW_SECONDS=${RATE_WINDOW_SECONDS:-60}
      - MAX_CONCURRENT_REQUESTS_PER_ID=${MAX_CONCURRENT_REQUESTS_PER_ID:-6}
      - MAX_GLOBAL_CONCURRENT_REQUESTS=${MAX_GLOBAL_CONCURRENT_REQUESTS:-64}
      - PENDING_REQUEST_TTL_SECONDS=${PENDING_REQUEST_TTL_SECONDS:-30}
      - BUILD_TIMEOUT_MS=${BUILD_TIMEOUT_MS:-30000}
      - RUN_TIMEOUT_MS=${RUN_TIMEOUT_MS:-10000}
      - MAX_OUTPUT_BYTES=${MAX_OUTPUT_BYTES:-262144}
      - PROJECT_REPO_PUSH_SWAP=${PROJECT_REPO_PUSH_SWAP:-https://github.com/AkJaum/push_swap.git}
      - PROJECT_REPO_GET_NEXT_LINE=${PROJECT_REPO_GET_NEXT_LINE:-https://github.com/AkJaum/get_next_line.git}
      - PROJECT_REPO_PRINTF=${PROJECT_REPO_PRINTF:-https://github.com/AkJaum/ft_printf.git}
      - PROJECT_REPO_LIBFT=${PROJECT_REPO_LIBFT:-https://github.com/AkJaum/libft.git}
    ports:
      - "${RUNNER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-app-web
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${APP_PORT:-3000}
      - PROJECT_RUNNER_URL=${PROJECT_RUNNER_URL:-http://project-runner:8080}
      - RUNNER_SHARED_TOKEN=${RUNNER_SHARED_TOKEN:?set RUNNER_SHARED_TOKEN}
      - PROJECT_IDLE_CLEANUP_MS=${PROJECT_IDLE_CLEANUP_MS:-60000}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      project-runner:
        condition: service_healthy
    restart: unless-stopped
